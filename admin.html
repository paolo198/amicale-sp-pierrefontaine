<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Amicale des sapeurs-pompiers de Pierrefontaine-les-Varans</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="glass-nav">
  <a href="index.html" class="brand">
    <img src="assets/logo.png" alt="Logo de l'amicale" class="brand-logo">
    <span class="brand-text">SP Pierrefontaine-les-Varans</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
  </div>
</nav>

<header class="page-header" style="background: linear-gradient(160deg, #241A15 0%, #14100D 100%);">
  <p class="eyebrow">Amicale des sapeurs-pompiers</p>
  <h1>Administration</h1>
</header>

<main>
  <section class="section" id="admin-login">
    <p class="section-eyebrow">Connexion</p>
    <h2>Accès réservé aux membres</h2>
    <form id="login-form" class="admin-form">
      <label>Email<input type="email" id="login-email" required></label>
      <label>Mot de passe<input type="password" id="login-password" required></label>
      <button type="submit" class="cta">Se connecter</button>
      <p class="admin-error" id="login-error"></p>
    </form>
  </section>

  <section class="section" id="admin-panel" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 32px;">
      <h2 style="margin:0;">Administration</h2>
      <button class="cta-outline" id="logout-btn" style="cursor:pointer;">Se déconnecter</button>
    </div>

    <h3 id="actu-form-title">Ajouter une actu</h3>
    <form id="actu-form" class="admin-form">
      <input type="hidden" id="actu-edit-id" value="">
      <label>Titre<input type="text" id="actu-titre" required></label>
      <label>Date<input type="date" id="actu-date" required></label>
      <label>Contenu<textarea id="actu-contenu" rows="4" required></textarea></label>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="cta" id="actu-submit-btn">Publier l'actu</button>
        <button type="button" class="cta-outline" id="actu-cancel-edit" style="display:none; cursor:pointer;">Annuler</button>
      </div>
    </form>
    <div id="actus-admin-list" class="admin-list"></div>

    <h3 style="margin-top:48px;" id="event-form-title">Ajouter un événement</h3>
    <form id="event-form" class="admin-form">
      <input type="hidden" id="event-edit-id" value="">
      <label>Titre<input type="text" id="event-titre" required></label>
      <label>Date<input type="date" id="event-date" required></label>
      <label>Lieu<input type="text" id="event-lieu" required></label>
      <label>Description (optionnel)<textarea id="event-description" rows="3"></textarea></label>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="cta" id="event-submit-btn">Publier l'événement</button>
        <button type="button" class="cta-outline" id="event-cancel-edit" style="display:none; cursor:pointer;">Annuler</button>
      </div>
    </form>
    <div id="events-admin-list" class="admin-list"></div>
  </section>
</main>

<footer class="site-footer">
  <p>Amicale des sapeurs-pompiers de Pierrefontaine-les-Varans</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="admin.js"></script>
</body>
</html>
